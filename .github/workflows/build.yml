name: Build Tianyi APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Arrange sources
        run: |
          mkdir -p app/src/main/java/com/tianyi/meihua app/src/main/assets
          mv build.gradle.kts app/build.gradle.kts
          mv AndroidManifest.xml app/src/main/AndroidManifest.xml
          mv MainActivity.java app/src/main/java/com/tianyi/meihua/MainActivity.java
          mv index.html app/src/main/assets/index.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tianyi-apk
          path: app/build/outputs/apk/debug/*.apk
